<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blox Fruits Restock Tracker</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-color: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--accent-color);
            margin-bottom: 5px;
        }

        .timer-box {
            background-color: var(--card-bg);
            padding: 15px 30px;
            border-radius: 10px;
            border: 2px solid var(--accent-color);
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 30px;
            box-shadow: 0 4px 10px rgba(56, 189, 248, 0.2);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }

        .fruit-card {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s;
        }

        .fruit-card:hover {
            transform: translateY(-5px);
        }

        .fruit-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .rarity {
            font-size: 0.9rem;
            text-transform: uppercase;
            margin-bottom: 10px;
            font-weight: bold;
        }

        /* Rarities Colors */
        .mythical { color: #ff4757; }
        .legendary { color: #ffa502; }
        .rare { color: #9b59b6; }
        .uncommon { color: #2ecc71; }
        .common { color: #7f8c8d; }

        .price {
            font-size: 1.1rem;
            color: #eccc68;
        }
    </style>
</head>
<body>

    <header>
        <h1>Blox Fruits Stock Tracker</h1>
        <p>Current active dealer stock & countdown</p>
    </header>

    <div class="timer-box">
        Next Restock In: <span id="countdown">00:00:00</span>
    </div>

    <div class="grid">
        <div class="fruit-card">
            <div class="fruit-name">Kitsune</div>
            <div class="rarity mythical">Mythical</div>
            <div class="price">$8,000,000</div>
        </div>
        <div class="fruit-card">
            <div class="fruit-name">Buddha</div>
            <div class="rarity legendary">Legendary</div>
            <div class="price">$1,200,000</div>
        </div>
        <div class="fruit-card">
            <div class="fruit-name">Light</div>
            <div class="rarity rare">Rare</div>
            <div class="price">$650,000</div>
        </div>
        <div class="fruit-card">
            <div class="fruit-name">Ice</div>
            <div class="rarity uncommon">Uncommon</div>
            <div class="price">$350,000</div>
        </div>
        <div class="fruit-card">
            <div class="fruit-name">Rocket</div>
            <div class="rarity common">Common</div>
            <div class="price">$5,000</div>
        </div>
    </div>

    <script>
        // 4-Hour In-Game Loop Timer Logic
        function updateCountdown() {
            const now = new Date();
            
            // Blox Fruits stock resets every 4 hours globally (00:00, 04:00, 08:00, etc. UTC)
            const hours = now.getUTCHours();
            const nextResetHour = hours + (4 - (hours % 4));
            
            const targetTime = new Date(now);
            targetTime.setUTCHours(nextResetHour, 0, 0, 0);
            
            const difference = targetTime - now;
            
            const h = Math.floor((difference / (1000 * 60 * 60)) % 24);
            const m = Math.floor((difference / (1000 * 60)) % 60);
            const s = Math.floor((difference / 1000) % 60);
            
            // Format to 2 digits
            const displayH = h < 10 ? '0' + h : h;
            const displayM = m < 10 ? '0' + m : m;
            const displayS = s < 10 ? '0' + s : s;
            
            document.getElementById('countdown').innerText = `${displayH}:${displayM}:${displayS}`;
        }

        // Run timer every second
        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
